<div class="page-header">
  <div>
    <h2>{{ isEdit ? 'Edit Milestone' : 'New Milestone' }}</h2>
    <p>Add a timeline milestone for the About page.</p>
  </div>
</div>

<div *ngIf="!isLoading; else loading">
  <form [formGroup]="form" (ngSubmit)="save()" class="form-card">
    <label class="field">
      <span>Year</span>
      <input type="text" formControlName="year" placeholder="e.g. 2024" />
      <small *ngIf="form.controls.year.touched && form.controls.year.invalid">Year is required.</small>
    </label>

    <label class="field">
      <span>Title</span>
      <input type="text" formControlName="title" placeholder="Milestone title" />
      <small *ngIf="form.controls.title.touched && form.controls.title.invalid">Title is required.</small>
    </label>

    <label class="field">
      <span>Description</span>
      <textarea rows="4" formControlName="description" placeholder="Describe this milestone..."></textarea>
      <small *ngIf="form.controls.description.touched && form.controls.description.invalid">
        Description is required (min 10 characters).
      </small>
    </label>

    <div class="form-actions">
      <button class="primary" type="submit" [disabled]="isSaving">
        {{ isSaving ? 'Saving...' : isEdit ? 'Update Milestone' : 'Create Milestone' }}
      </button>
      <button *ngIf="isEdit" class="secondary" type="button" [disabled]="isSaving" (click)="cancel()">
        Cancel
      </button>
    </div>
  </form>
</div>

<ng-template #loading>
  <div class="loading">Loading milestone...</div>
</ng-template>
