<div class="page-header">
  <div>
    <h2>Upcoming Events</h2>
    <p>Manage upcoming event announcements.</p>
  </div>
  <a class="primary" routerLink="/admin/events/new">Add Event</a>
</div>

<div *ngIf="!isLoading; else loading">
  <div class="table-card" *ngIf="events.length; else empty">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Cover</th>
          <th>Location</th>
          <th>Date</th>
          <th class="actions-head">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let event of events">
          <td>{{ event.title }}</td>
          <td>
            <img *ngIf="event.image" class="thumb" [src]="event.image" [alt]="event.title" />
            <span *ngIf="!event.image">-</span>
          </td>
          <td>{{ event.location }}</td>
          <td>{{ event.eventDate | date: 'mediumDate' }}</td>
          <td class="actions">
            <a
              class="action-btn action-edit"
              [routerLink]="['/admin/events/edit', event.id]"
              title="Edit event"
              aria-label="Edit event"
            >
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M3 17.25V21h3.75L19.81 7.94l-3.75-3.75L3 17.25Z" stroke="currentColor" stroke-width="1.8" />
                <path d="M14.06 4.19 17.81 7.94" stroke="currentColor" stroke-width="1.8" />
              </svg>
            </a>
            <button
              type="button"
              class="action-btn action-delete"
              title="Delete event"
              aria-label="Delete event"
              (click)="deleteEvent(event)"
            >
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 7h16" stroke="currentColor" stroke-width="1.8" />
                <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.8" />
                <path d="M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="1.8" />
                <path d="M9 7V4h6v3" stroke="currentColor" stroke-width="1.8" />
              </svg>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<ng-template #empty>
  <div class="empty-state">No events yet. Add your first event.</div>
</ng-template>

<ng-template #loading>
  <div class="loading">Loading events...</div>
</ng-template>
