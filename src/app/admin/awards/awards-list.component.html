<div class="page-header">
  <div>
    <h2>Awards & Recognition</h2>
    <p>Manage awards and recognition entries.</p>
  </div>
  <a class="primary" routerLink="/admin/awards/new">Add Award</a>
</div>

<div *ngIf="!isLoading; else loading">
  <div class="table-card" *ngIf="awards.length; else empty">
    <table>
      <thead>
        <tr>
          <th>Year</th>
          <th>Title</th>
          <th>Organization</th>
          <th>Cover</th>
          <th class="actions-head">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let award of awards">
          <td>{{ award.year }}</td>
          <td>{{ award.title }}</td>
          <td>{{ award.organization }}</td>
          <td>
            <img *ngIf="award.image" class="thumb" [src]="award.image" [alt]="award.title" />
            <span *ngIf="!award.image">-</span>
          </td>
          <td class="actions">
            <a
              class="action-btn action-edit"
              [routerLink]="['/admin/awards/edit', award.id]"
              title="Edit award"
              aria-label="Edit award"
            >
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M3 17.25V21h3.75L19.81 7.94l-3.75-3.75L3 17.25Z" stroke="currentColor" stroke-width="1.8" />
                <path d="M14.06 4.19 17.81 7.94" stroke="currentColor" stroke-width="1.8" />
              </svg>
            </a>
            <button
              type="button"
              class="action-btn action-delete"
              title="Delete award"
              aria-label="Delete award"
              (click)="deleteAward(award)"
            >
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 7h16" stroke="currentColor" stroke-width="1.8" />
                <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.8" />
                <path d="M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="1.8" />
                <path d="M9 7V4h6v3" stroke="currentColor" stroke-width="1.8" />
              </svg>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<ng-template #empty>
  <div class="empty-state">No awards yet. Add your first award.</div>
</ng-template>

<ng-template #loading>
  <div class="loading">Loading awards...</div>
</ng-template>
