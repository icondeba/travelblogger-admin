<div class="page-header">
  <div>
    <h2>{{ isEdit ? 'Edit Story' : 'New Story' }}</h2>
    <p>Write and publish your story.</p>
  </div>
</div>

<div *ngIf="!isLoading; else loading">
  <form [formGroup]="form" (ngSubmit)="save()" class="form-card">
    <label class="field">
      <span>Title</span>
      <input type="text" formControlName="title" placeholder="Story title" />
      <small *ngIf="form.controls.title.touched && form.controls.title.invalid">Title is required.</small>
    </label>

    <label class="field">
      <span>Slug</span>
      <input type="text" formControlName="slug" placeholder="story-title" />
      <small *ngIf="form.controls.slug.touched && form.controls.slug.invalid">Slug is required.</small>
    </label>

    <label class="field">
      <span>Excerpt</span>
      <textarea rows="3" formControlName="excerpt" placeholder="Short summary shown in listings"></textarea>
      <small *ngIf="form.controls.excerpt.touched && form.controls.excerpt.invalid">
        Excerpt is required (max 500 characters).
      </small>
    </label>

    <label class="field">
      <span>Status</span>
      <select formControlName="status">
        <option value="Draft">Draft</option>
        <option value="Published">Published</option>
      </select>
    </label>

    <label class="field">
      <span>Cover Image</span>
      <input type="file" accept="image/png,image/jpeg,image/webp" (change)="onFileSelected($event)" />
      <small>Upload JPG, PNG, or WEBP (max 5MB). You can replace it later.</small>
    </label>

    <div class="preview" *ngIf="imagePreview">
      <img [src]="imagePreview" alt="Story cover preview" />
    </div>

    <label class="field">
      <span>Content</span>
      <quill-editor theme="snow" formControlName="content" [styles]="{ height: '260px' }"></quill-editor>
      <small *ngIf="form.controls.content.touched && form.controls.content.invalid">
        Content is required.
      </small>
    </label>

    <label class="field">
      <span>Publish Date</span>
      <input type="date" formControlName="publishDate" />
    </label>

    <div class="form-actions">
      <button class="primary" type="submit" [disabled]="isSaving">
        {{ isSaving ? 'Saving...' : isEdit ? 'Update Story' : 'Publish Story' }}
      </button>
      <button *ngIf="isEdit" class="secondary" type="button" [disabled]="isSaving" (click)="cancel()">
        Cancel
      </button>
    </div>
  </form>
</div>

<ng-template #loading>
  <div class="loading">Loading story...</div>
</ng-template>
