<div class="page-header">
  <div>
    <h2>About Me</h2>
    <p>View, edit, or delete the current About Me content.</p>
  </div>
</div>

<div *ngIf="!isLoading; else loading">
  <div class="load-error" *ngIf="loadError && !aboutRecord">
    {{ loadError }}
  </div>

  <div class="existing-card" *ngIf="aboutRecord && !isEditing">
    <div class="existing-header">
      <h3>Existing Data</h3>
      <p>Last updated: {{ aboutRecord.updatedAt | date: 'medium' }}</p>
    </div>

    <h4 class="existing-heading">{{ aboutRecord.heading }}</h4>
    <p class="existing-biography">{{ aboutRecord.biography }}</p>

    <div class="preview" *ngIf="aboutRecord.profileImageUrl">
      <img [src]="aboutRecord.profileImageUrl" alt="Existing profile image" />
    </div>

    <div class="actions">
      <button type="button" class="primary" (click)="startEditing()">Edit</button>
      <button type="button" class="danger" (click)="deleteAbout()" [disabled]="isSaving">
        {{ isSaving ? 'Deleting...' : 'Delete' }}
      </button>
    </div>
  </div>

  <form *ngIf="isEditing || !aboutRecord" [formGroup]="form" (ngSubmit)="save()" class="form-card">
    <label class="field">
      <span>Heading</span>
      <input type="text" formControlName="heading" placeholder="Decades of alpine leadership and storytelling." />
      <small *ngIf="form.controls.heading.touched && form.controls.heading.invalid">
        Heading is required (5-250 characters).
      </small>
    </label>

    <label class="field">
      <span>Biography</span>
      <textarea rows="8" formControlName="biography" placeholder="Write your full story..."></textarea>
      <small *ngIf="form.controls.biography.touched && form.controls.biography.invalid">
        Biography is required (minimum 20 characters).
      </small>
    </label>

    <label class="field">
      <span>Profile Image</span>
      <input type="file" accept="image/png,image/jpeg,image/webp" (change)="onFileSelected($event)" />
      <small *ngIf="form.controls.profileImageUrl.touched && form.controls.profileImageUrl.invalid">
        Please upload a profile image.
      </small>
    </label>

    <div class="preview" *ngIf="imagePreview">
      <img [src]="imagePreview" alt="Profile preview" />
    </div>

    <div class="actions">
      <button class="primary" type="submit" [disabled]="isSaving">
        {{ isSaving ? 'Saving...' : 'Save Changes' }}
      </button>
      <button type="button" class="secondary" (click)="cancelEditing()" [disabled]="isSaving">
        Cancel
      </button>
    </div>
  </form>
</div>

<ng-template #loading>
  <div class="loading">Loading about content...</div>
</ng-template>
